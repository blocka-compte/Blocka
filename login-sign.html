<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blocka Login System</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:white;
}

.topbar{
  position:fixed;
  top:0;
  width:100%;
  height:55px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
  font-size:20px;
  background:rgba(255,255,255,0.15);
  backdrop-filter: blur(15px);
}

.box{
  width:300px;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.15);
  backdrop-filter: blur(15px);
  text-align:center;
}

input{
  width:90%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  text-align:center;
}

button{
  width:95%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:rgba(255,255,255,0.25);
  color:white;
  font-weight:bold;
}

button:hover{
  background:rgba(255,255,255,0.35);
}

.hidden{display:none;}

a{
  color:white;
  cursor:pointer;
  display:block;
  margin-top:8px;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
emailjs.init({
  publicKey: "TePCFeYC3SHgmSZrX"
});
</script>

</head>

<body>

<div class="topbar">BLOCKA</div>

<div class="box">

  <h3 id="title">Login</h3>

  <!-- LOGIN -->
  <div id="loginBox">
    <input type="email" id="loginEmail" placeholder="Email">
    <button onclick="login()">Login</button>
    <a onclick="showSign()">Create account</a>
  </div>

  <!-- SIGN -->
  <div id="signBox" class="hidden">
    <input type="text" id="name" placeholder="Username">
    <input type="email" id="signEmail" placeholder="Email">
    <button onclick="sign()">Sign Up</button>
    <a onclick="showLogin()">Back</a>
  </div>

  <!-- OTP -->
  <div id="otpBox" class="hidden">
    <input type="text" id="otp" maxlength="6" placeholder="6-digit code">
    <button onclick="verify()">Verify</button>
  </div>

</div>

<script>
let code = "";
let tempUser = {};

// التحقق من الإيميل
function validEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function showLogin(){
  document.getElementById("loginBox").classList.remove("hidden");
  document.getElementById("signBox").classList.add("hidden");
  document.getElementById("otpBox").classList.add("hidden");
  document.getElementById("title").innerText = "Login";
}

function showSign(){
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("signBox").classList.remove("hidden");
  document.getElementById("otpBox").classList.add("hidden");
  document.getElementById("title").innerText = "Sign Up";
}

// LOGIN
function login(){

  let email = document.getElementById("loginEmail").value.trim();

  if(email === ""){
    alert("Enter your email.");
    return;
  }

  if(!validEmail(email)){
    alert("Invalid email address.");
    return;
  }

  tempUser = { email };

  sendCode(email);

}

// SIGN
function sign(){

  let name = document.getElementById("name").value.trim();
  let email = document.getElementById("signEmail").value.trim();

  if(name === "" || email === ""){
    alert("Fill all fields.");
    return;
  }

  if(!validEmail(email)){
    alert("Invalid email address.");
    return;
  }

  tempUser = {
    name: name,
    email: email
  };

  sendCode(email);

}

// إرسال الكود
function sendCode(email){

  code = Math.floor(100000 + Math.random() * 900000);

  emailjs.send("service_5u14bbs","template_dgu9bca",{
    to_email: email,
    code: code
  })

  .then(function(){

    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("signBox").classList.add("hidden");
    document.getElementById("otpBox").classList.remove("hidden");

    document.getElementById("title").innerText = "Verify";

    alert("Verification code sent.");

  })

  .catch(function(error){

    console.log(error);

    alert("Failed to send email.");

  });

}

// التحقق من الكود
function verify(){

  let input = document.getElementById("otp").value.trim();

  if(input !== code.toString()){
    alert("Wrong verification code.");
    return;
  }

  localStorage.setItem("user", JSON.stringify(tempUser));

  alert("Login successful!");

  window.location.href = "home.html";

}

// تسجيل دخول تلقائي
window.onload = function(){

  let user = localStorage.getItem("user");

  if(user){
    window.location.href = "home.html";
  }

}
</script>

</body>
  </html>
