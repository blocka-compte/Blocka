<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blocka</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
    overflow-x:hidden;
}

/* Top Bar */

.topbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:60px;
    background:#2d2d2d;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    z-index:1000;
    box-shadow:0 2px 10px rgba(0,0,0,.2);
}

.menu-btn{
    font-size:24px;
    cursor:pointer;
}

.logo{
    height:40px;
    width:auto;
    object-fit:contain;
}

/* Sidebar */

.sidebar{
    position:fixed;
    top:0;
    left:-260px;
    width:260px;
    height:100%;
    background:#1f1f1f;
    transition:.3s;
    padding-top:70px;
    z-index:999;
}

.sidebar.open{
    left:0;
}

.sidebar a{
    display:flex;
    align-items:center;
    gap:15px;
    color:#fff;
    text-decoration:none;
    padding:18px 25px;
    font-size:18px;
    transition:.2s;
}

.sidebar a:hover{
    background:#3d3d3d;
    padding-left:35px;
}

/* Overlay */

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.45);
    display:none;
    z-index:998;
}

/* Pages */

.page{
    display:none;
    padding:90px 30px;
}

.page.active{
    display:block;
}

.page h1{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:15px;
    font-size:32px;
    color:#2d2d2d;
}

.page h1 i{
    color:#2d2d2d;
}

.page p{
    font-size:18px;
    color:#555;
}
</style>
</head>
<body>

<!-- Top Bar -->

<div class="topbar">
    <div class="menu-btn" onclick="openMenu()">
        <i class="fa-solid fa-bars"></i>
    </div>

    <img src="Blocka.png" alt="Blocka Logo" class="logo">
</div>

<!-- Sidebar -->

<div class="sidebar" id="sidebar">

<a href="#" onclick="showPage('home')">
    <i class="fa-solid fa-house"></i>
    Home
</a>

<a href="#" onclick="showPage('news')">
    <i class="fa-solid fa-newspaper"></i>
    News
</a>

<a href="#" onclick="showPage('settings')">
    <i class="fa-solid fa-gear"></i>
    Settings
</a>

<a href="#" onclick="showPage('feedback')">
    <i class="fa-solid fa-comment-dots"></i>
    Feedback
</a>

<a href="#" onclick="showPage('logout')">
    <i class="fa-solid fa-right-from-bracket"></i>
    Logout
</a>

</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- Home -->

<div id="home" class="page active">
    <h1><i class="fa-solid fa-house"></i> Home</h1>
    <p>Welcome to the Home page.</p>
</div>

<!-- News -->

<div id="news" class="page">
    <h1><i class="fa-solid fa-newspaper"></i> News</h1>
    <p>Latest news and updates will appear here.</p>
</div>

<!-- Settings -->

<div id="settings" class="page">
    <h1><i class="fa-solid fa-gear"></i> Settings</h1>
    <p>Manage your application settings here.</p>
</div>

<!-- Feedback -->

<div id="feedback" class="page">
    <h1><i class="fa-solid fa-comment-dots"></i> Feedback</h1>
    <p>Send us your feedback and suggestions.</p>
</div>

<!-- Logout -->

<div id="logout" class="page">
    <h1><i class="fa-solid fa-right-from-bracket"></i> Logout</h1>
    <p>You have been logged out successfully.</p>
</div>

<script>
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");

function openMenu(){
    sidebar.classList.add("open");
    overlay.style.display = "block";
}

function closeMenu(){
    sidebar.classList.remove("open");
    overlay.style.display = "none";
}

function showPage(id){
    document.querySelectorAll(".page").forEach(page=>{
        page.classList.remove("active");
    });

    document.getElementById(id).classList.add("active");

    closeMenu();
}
</script>

</body>
</html>
