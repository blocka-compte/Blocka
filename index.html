<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Glass UI Final</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  height: 100vh;
  overflow-x: hidden;
  background: linear-gradient(135deg, #667eea, #764ba2);
}

/* GLASS */
.glass {
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 12px;
  color: white;
}

/* TOPBAR */
.topbar {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  padding: 12px 20px;

  display: flex;
  justify-content: space-between;
  align-items: center;

  z-index: 1100;
  border-radius: 0;
}

/* MENU */
.menu-btn {
  background: rgba(255,255,255,0.2);
  border: none;
  color: white;
  padding: 8px 12px;
  border-radius: 10px;
  cursor: pointer;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  top: 0;
  left: 0;
  width: 280px;
  height: 100%;

  padding: 20px;
  padding-top: 80px;

  z-index: 1200;
  transform: translateX(-110%);
  transition: transform 0.3s ease;
}

.sidebar.active {
  transform: translateX(0);
}

/* CLOSE */
.close-btn {
  position: absolute;
  top: 15px;
  right: 15px;

  width: 35px;
  height: 35px;

  border: none;
  border-radius: 10px;

  background: rgba(255,255,255,0.2);
  color: white;
  font-size: 18px;
  cursor: pointer;
}

/* SECTION */
.section-card {
  padding: 12px;
  margin-bottom: 15px;
}

.section-title {
  font-size: 12px;
  opacity: 0.7;
  margin-bottom: 10px;
}

/* LINKS */
.sidebar a {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 6px 0;
  padding: 10px;
  color: white;
  text-decoration: none;
  border-radius: 10px;
  cursor: pointer;
}

.sidebar a:hover {
  background: rgba(255,255,255,0.2);
}

/* ICON */
.icon {
  width: 20px;
  height: 20px;
  fill: white;
  flex-shrink: 0;
  opacity: 0.9;
  transition: 0.2s;
}

.sidebar a:hover .icon {
  transform: scale(1.15);
}

/* CONTENT */
.content {
  padding: 90px 20px 20px 20px;
  color: white;
}

.card {
  padding: 20px;
  margin-top: 20px;
}

/* PAGES */
.page { display: none; }
.page.active { display: block; }
</style>
</head>

<body>

<!-- ICONS -->
<svg style="display:none;">
  <symbol id="home" viewBox="0 0 24 24">
    <path d="M12 3.2l8.5 7.2v10.1a1.5 1.5 0 0 1-1.5 1.5h-4.5v-6h-5v6H5a1.5 1.5 0 0 1-1.5-1.5V10.4L12 3.2z"/>
  </symbol>

  <symbol id="news" viewBox="0 0 24 24">
    <path d="M5 4h14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2zm2 4h10v2H7V8zm0 4h10v2H7v-2zm0 4h7v2H7v-2z"/>
  </symbol>

  <symbol id="feedback" viewBox="0 0 24 24">
    <path d="M21 6.5a3.5 3.5 0 0 0-3.5-3.5h-11A3.5 3.5 0 0 0 3 6.5v7A3.5 3.5 0 0 0 6.5 17H9l3.5 3.5a1 1 0 0 0 1.7-.7V17h3.3A3.5 3.5 0 0 0 21 13.5v-7z"/>
  </symbol>

  <symbol id="user" viewBox="0 0 24 24">
    <path d="M12 12a4.5 4.5 0 1 0-4.5-4.5A4.5 4.5 0 0 0 12 12zm0 2c-4.4 0-8 2.2-8 5v1h16v-1c0-2.8-3.6-5-8-5z"/>
  </symbol>

  <symbol id="donat" viewBox="0 0 24 24">
    <path d="M12 2c-5 0-9 2.5-9 5.5S7 13 12 13s9-2.5 9-5.5S17 2 12 2zm0 2c3.9 0 7 1.7 7 3.5S15.9 11 12 11 5 9.3 5 7.5 8.1 4 12 4zm-2 9v2h4v-2c2.2-.4 4-1.6 4-3v-1h-2v.8c0 .8-1.3 1.6-3 1.8V9h-2v2.6c-1.7-.2-3-.9-3-1.7V9H6v1c0 1.4 1.8 2.6 4 3z"/>
  </symbol>

  <symbol id="settings" viewBox="0 0 24 24">
    <path d="M19.14 12.94a7.43 7.43 0 0 0 .05-.94 7.43 7.43 0 0 0-.05-.94l2.11-1.65a.5.5 0 0 0 .12-.64l-2-3.46a.5.5 0 0 0-.6-.22l-2.49 1a7.28 7.28 0 0 0-1.63-.94l-.38-2.65A.5.5 0 0 0 13.82 2h-3.64a.5.5 0 0 0-.49.42l-.38 2.65a7.28 7.28 0 0 0-1.63.94l-2.49-1a.5.5 0 0 0-.6.22l-2 3.46a.5.5 0 0 0 .12.64l2.11 1.65a7.43 7.43 0 0 0-.05.94c0 .32.02.63.05.94L2.38 15.53a.5.5 0 0 0-.12.64l2 3.46c.13.22.4.31.6.22l2.49-1c.5.37 1.05.68 1.63.94l.38 2.65c.05.24.25.42.49.42h3.64c.24 0 .44-.18.49-.42l.38-2.65c.58-.26 1.13-.57 1.63-.94l2.49 1c.2.09.47 0 .6-.22l2-3.46a.5.5 0 0 0-.12-.64l-2.11-1.65zM12 15.5A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5z"/>
  </symbol>
</svg>

<!-- TOPBAR -->
<div class="glass topbar">
  <button class="menu-btn" onclick="openMenu()">☰</button>
  <div>Home Page</div>
</div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar glass">

  <button class="close-btn" onclick="closeMenu()">✕</button>

  <div class="glass section-card">
    <div class="section-title">MAIN</div>

    <a onclick="showPage('home')">
      <svg class="icon"><use href="#home"/></svg>
      Home
    </a>

    <a onclick="showPage('news')">
      <svg class="icon"><use href="#news"/></svg>
      News
    </a>
  </div>

  <div class="glass section-card">
    <div class="section-title">SUPPORT</div>

    <a href="feedback.html">
      <svg class="icon"><use href="#feedback"/></svg>
      Feedback
    </a>

    <a href="donat.html">
      <svg class="icon"><use href="#donat"/></svg>
      Donat
    </a>
  </div>

  <div class="glass section-card">
    <div class="section-title">ACCOUNT</div>

    <a href="login-sign.html" id="loginBtn">
      <svg class="icon"><use href="#user"/></svg>
      Login / Sign
    </a>

  </div>

  <div class="glass section-card">
    <div class="section-title">SYSTEM</div>

    <a onclick="showPage('settings')">
      <svg class="icon"><use href="#settings"/></svg>
      Settings
    </a>

  </div>

</div>

<!-- CONTENT -->
<div class="content">

  <div id="home" class="page active">
    <h1>Home</h1>
    <div class="glass card">Welcome Home</div>
  </div>

  <div id="news" class="page">
    <h1>News</h1>
    <div class="glass card">Latest updates</div>
  </div>

  <div id="settings" class="page">
    <h1>Settings</h1>
    <div class="glass card">
      <p>⚙️ Settings page content here</p>
    </div>
  </div>

</div>

<script>
function openMenu() {
  document.getElementById("sidebar").classList.add("active");
}

function closeMenu() {
  document.getElementById("sidebar").classList.remove("active");
}

function showPage(page) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(page).classList.add("active");
  closeMenu();
}

/* ✅ LOGIN CHECK */
window.onload = function () {
  const email = localStorage.getItem("userEmail");
  const loginBtn = document.getElementById("loginBtn");

  if (email) {
    loginBtn.innerHTML = `
      <svg class="icon"><use href="#user"/></svg>
      Profile
    `;
    loginBtn.href = "profile.html";
  }
};
</script>

</body>
      </html>
